<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Table</title>
</head>

<body>
    <h2>User list</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>

    <script>
        let users=[
            { name: "Ali", age: 22, email: "ali@mail.com" },
            { name: "Sara", age: 25, email: "sara@mail.com" }
        ];

        function displayUsers() {
            let table=document.getElementById("userTable");
            table.innerHTML="";
            for (let i=0;i<users.length;i++) {
                let u=users[i];
                let row=document.createElement("tr");
                row.innerHTML="<td>"+u.name+"</td><td>"+u.age+"</td><td>"+u.email+"</td><td><button onclick='editUser("+i+")'>Edit</button></td>";
                table.appendChild(row);
            }
        }

        function editUser(index) {
            let table=document.getElementById("userTable");
            let u=users[index];
            table.children[index].innerHTML="<td><input id='name"+index+"' value='"+u.name+"'></td><td><input id='age"+index+"' value='"+u.age+"'></td><td>"+u.email+"</td><td><button onclick='saveUser("+index+")'>Save</button></td>";
        }

        function saveUser(index) {
            let name=document.getElementById("name"+index).value;
            let age=document.getElementById("age"+index).value;
            users[index].name=name;
            users[index].age=age;
            displayUsers();
        }

        displayUsers();
    </script>

</body>

</html>
